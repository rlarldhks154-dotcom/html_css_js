<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스모델</title>
    <style>
        h1 {
            padding-bottom: 5px;
            border-bottom: 3px solid;
        }
        p {
            padding: 10px;
            border: 3px dotted blue;
        }
        .round {
            border-radius: 25px ;
        }
        .circle {
            border-radius: 20%;
        }
    </style>
</head>
<body>
    <h1>박스 모델</h1>
    <p class="round">박스 모델은 실제 컨텐츠 영역, 박스와 컨텐츠 영역 사이의 여백인 패딩, 박스의 테두리, 그리고 여러 박스 모델 간의 여백인 마진 등의 요소로 구성되어 있습니다.</p>
    <img src="images/photo.jpg" alt="" class="circle">
</body>
</html>
