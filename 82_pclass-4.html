<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상 선택자</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 20px;
        }
        .container{
            width: 300px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            text-align: center;
        }
        .container p:nth-of-type(1){
            background-color: #fc2;
        }
        .container div:nth-of-type(2){
            background-color: #f0c8fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <p>첫 번째</p>
        <div>두 번째</div>
        <p>세 번째</p>
        <div>네 번째</div>
    </div>

</body>
</html>
