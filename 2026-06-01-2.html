<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>09\quiz-2.html</title>
  <style>
    body {
      background-color: #02233b;
      margin: 0;
      padding: 20px;
    }

    #container {
      background-color: #fff;
      background-image: url("images/mic.png");
      background-repeat: no-repeat;
      background-position: right bottom;
      
      width: 500px;
      margin: 0 auto;
      padding: 30px;
      height: 600px;
    }

    h1 {
      background-color: #004344;
      color: #ffffff;
      text-align: center;
      padding: 15px;
      margin-top: 0;
    }

    h2 {
      text-align: center;
      font-style: italic;
      margin-bottom: 24px;
    }
    h3 {
      color: #b22222;
      font-size: 16px;
      margin-top: 20px;
    }
    ul {
      list-style-type: none;
      padding-left: 0;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div id="container">
    
    <h1>대학언론사 수습기자 모집</h1>
    
    <h2>신입생 여러분을 기다립니다</h2>

    <h3>모집분야</h3>
    <ul>
      <li>아나운서(0명) : 학내 소식을 라디오 방송으로 보도</li>
      <li>프로듀서(0명) : 라디오 방송 기획, 제작</li>
      <li>엔지니어(0명) : 라디오 방송 녹음 및 편집</li>
    </ul>

    <h3>혜택</h3>
    <ul>
      <li>수습기자 활동 중 소정의 활동비 지급</li>
      <li>정기기자로 승격하면 장학금 지급</li>
    </ul>

  </div>
</body>
</html>
