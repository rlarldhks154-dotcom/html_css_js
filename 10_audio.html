<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티미디어 파일 삽입하기</title>
</head>
<body>
    <!-- pdf 파일 -->
    <object data="product.pdf" width="900" height="800"></object>

    <!-- embed 태그 : 오래된 컴퓨터에도 사용 가능! -->
    <embed src="medias/spring.mp3" >
    
    <!-- audio 태그 : 웹브라우저에 따라 플레이어가 달라진다. -->
     <!-- loop : 계속 반복 -->
    <audio src="medias/spring.mp3" controls loop></audio>
    
    <p></p>

    <!-- video 태그 -->
    <!-- poster 속성 : 썸네일 -->
    <video src="medias/salad.mp4" controls width="700" poster="images/salad.jpg"></video>

    <p></p>
    <!-- 소리 제거, 반복 재생, 자동 재생 -->
    <video src="medias/salad.mp4" controls width="500" muted autoplay loop></video>
    

</body>
</html>
