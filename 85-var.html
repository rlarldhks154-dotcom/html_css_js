<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 함수 - var()</title>
    <style>
        :root{
            --main-bg-color: #222;
            --main-text-color: #fff;
        }
        body{
            background-color: var(--main-bg-color);
            color: var(--main-text-color);
        }
    </style>
</head>
<body>
    <div class="heading">
        <h1>CSS 함수</h1>
    </div>
</body>
</html>
