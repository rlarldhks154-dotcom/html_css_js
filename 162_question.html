<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>162 연습문제</title>
</head>
<body>
    <form>
        <fieldset>
            <h1>프런트엔드 개발자 지원서</h1>
            <p>HTML, cSS를 비롯한 웹 개발 관련 기술에 대한 이해와 경험이 있는 분을 찾습니다.</p>
            <hr>
            <p><b>개인정보</b></p>
            <label">이름</label><input type="text" placeholder="공백 없이 입력하세요"><br>
            <label>연락처</label><input type="tel">
            <p><b>지원 분야</b></p>
            <p><input type="radio"><label>웹 퍼블리싱</label></p>
            <p><input type="radio"><label>웹 애플리케이션 개발</label></p>
            <p><input type="radio"><label>개발 환경 개선</label></p>
            <p><b>지원동기</b></p>
            <p><textarea name="지원동기" cols="60" rows="5" placeholder="본사 지원 동기를 간략히 써 주세요"></textarea></p>
            <input type="submit" value="접수하기">
            <input type="reset" value="다시 쓰기">
        </fieldset>
    </form>
</body>
</html>
