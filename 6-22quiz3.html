<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14장 퀴즈 1번</title>
    <style>
        .container {
            display: flex;
            align-items: center;
            padding: 20px;
        }
        .spinner {
            width: 100px;
            height: 100px;
            background-image: url('images/ball.png');
            background-size: cover;
            animation: rotate-ball 2s linear infinite;
        }
        @keyframes rotate-ball {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
    </div>

</body>
</html>
