<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트렌지션 - rotate 함수</title>
    <style>
        #container{
            width: 800px;
            margin: 20px auto;
        }
        .origin{
            float: left;
            margin: 40px;
            border: 1px solid #ccc;
        }
        #rotate1:hover{
            transform: rotate(40deg);
        }
        #rotate2:hover{
            transform: rotate(-40deg);
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="origin" id="rotate1">
            <img src="images/home.png">
        </div>
        <div class="origin" id="rotate2">
            <img src="images/home.png">
        </div>
    </div>
</body>
</html>
