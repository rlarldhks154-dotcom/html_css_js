<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 소개 페이지</title>

    <!-- 내부 css 스타일 시트 -->
    <style>
        /* body {
            background: url('images/bg-2.jpg') no-repeat fixed;
            background-size: cover;
            text-align: center;
        } */
        h1 {
            font-size: 180px;
            color: rgba(rgb(250, 153, 153), rgb(166, 240, 166), rgb(195, 195, 223), alpha);
        }
        p {
            width: 410px;
            border: 1px solid #222;
            padding: 10px;
            margin: 10px;
            font-size: 1.1em;
        }
        .center {
            text-align: center;
        }
        .justify {
            text-align: justify;
        }
    </style>
</head>
<body>
    <h1>CSS</h1>
    <p>껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다. 레드향은 한라봉과 귤을 교배한 것으로 일반 귤보다 2~3배 크고 과육이 붉고 통통하다.</p>
    <p class="center">껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다. 레드향은 한라봉과 귤을 교배한 것으로 일반 귤보다 2~3배 크고 과육이 붉고 통통하다.</p>
    <p class="justify">껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다. 레드향은 한라봉과 귤을 교배한 것으로 일반 귤보다 2~3배 크고 과육이 붉고 통통하다.</p>
</body>
</html>
