<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 650px;
            height: 150px;
            display: flex;
            align-items: center;
            background-color: #eee;
            gap: 10px;
        }
        .box{
            width: 80px;
            padding: 10px;
        }
        .box:nth-child(odd){
            background-color: rgb(238, 187, 0);
        }
        .box:nth-child(even){
            background-color: rgb(35,250,35);
        }
        p{
            text-align: center;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>
</html>
