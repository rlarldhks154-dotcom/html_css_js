<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            float: left;
            width: 300x;
            height: 300px;
            display: flex;
            flex-flow: row wrap;
            align-items: center;
            background-color: #eee;
            border: 1px solid #222;
            margin-bottom: 30px;
        }
        .box{
            width: 80px;
            padding: 5px 45px;
            margin: 5px;
        }
        .box:nth-child(odd){
            background-color: rgb(238, 187, 0);
        }
        .box:nth-child(even){
            background-color: rgb(35,250,35);
        }
        p{
            text-align: center;
            font-weight: bold;
        }
        #box1{
            align-self: flex-start;
        }
        #box3{
            align-self: stretch;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>
</html>
