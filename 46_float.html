<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델</title>
    <style>
        .wrapper {
                width: 800px;
                margin: 10px auto;
                padding: 20px;
                border: 1px solid #ccc;
            }
            .box {
                padding: 20px;
                margin: 10px;
            }
            #box1 {
                background: #ffd800;
                float: left;
            }
            #box2 {
                background: #0094ff;
                float: right;
            }
    </style>
    
</head>
<body>
    <div class="wrapper">
        <div class="box" id="box1">박스1</div>
        <div class="box" id="box2">박스2</div>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Veritatis, officiis sit nemo dolor itaque repellat error molestiae eum dicta totam quis non sed vel in ullam esse hic obcaecati tempore.</p>
    </div>
</body>
</html>
