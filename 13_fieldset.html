<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레드향 주문하기</title>
</head>
<body>
    <h1>레드향 주문하기</h1>
    
    <!-- form 태그 삽입 -->
     <form action="" autocomplete="off">
        <!-- 폼 안에서 여러 구역을 그룹으로 묶기 -->
        <fieldset>
            <!-- 그룹 제목 붙이기 -->
            <legend>상품 검색</legend>
        </fieldset>
        <fieldset>
            <legend>배송 정보</legend>
        </fieldset>
            <!-- label 태그 안에 input 태그 넣기 -->
        <label for="user-id">아이디(6자 이상)
            <input type="text" id="user-id">
        </label>
        <!-- 로그인 폼 만들기 (아이디/비밀번호) -->
        <label for="">아이디 : <input type="text" id="user-id" size="10"></label>
        <label for="">비밀번호 : <input type="password" id="user-pw" size="10"></label>
        <input type="submit" value="로그인">
     </form>


</body>
</html>
