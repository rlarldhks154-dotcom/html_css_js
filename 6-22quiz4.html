<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>14장 퀴즈 2번</title>
    <style>
        .track {
            width: 450px;
            border: 1px solid #ccc;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .box {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background-color: #ffe867;
            animation: changeColor 3s infinite, translate-box 3s infinite alternate;
        }
        @keyframes changeColor {
            0% { background-color: #ffe867; }
            50% { background-color: #ff5e62; }
            100% { background-color: #17bdff; }
        }
        @keyframes translate-box {
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(400px);
            }
        }
    </style>
</head>
<body>

    <div style="display: flex; width: 450px; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #555;">
        <span>시작 색 #ffe867</span>
        <span>중간 색 #ff5e62</span>
        <span>끝 색 #17bdff</span>
    </div>

    <div class="track">
        <div class="box"></div>
    </div>

</body>
</html>
