<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 그리드 배치 퀴즈</title>
  <style>
    .container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 20px;
      max-width: 600px;
      height: 450px;
      margin: 50px auto;
      background-color: #111;
      padding: 20px;
      box-sizing: border-box;
    }

    .container > div {
      background-color: #e2e617;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      color: #000;
    }

    .container > div:nth-child(1) {
      grid-column: 1 / 3;
      grid-row: 1 / 3;
    }

    .container > div:nth-child(2) {
      grid-column: 3 / 5;
      grid-row: 1 / 2;
    }

    .container > div:nth-child(3) {
      grid-column: 3 / 4;
      grid-row: 2 / 4;
    }

    .container > div:nth-child(4) {
      grid-column: 4 / 5;
      grid-row: 2 / 4;
    }

    .container > div:nth-child(5) {
      grid-column: 1 / 3;
      grid-row: 3 / 4;
    }
  </style>
</head>
<body>
  <div class="container">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
  </div>
</body>
</html>
