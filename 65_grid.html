<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            width: 700px;
            display: grid;
            grid-template-rows: repeat(3, 100px);
            grid-template-areas: 
            "box1 box1 box1"
            "box2 box3 box3"
            "box2 box4 box5";
            gap: 1rem;
        }
        .box1{
            background-color: yellow;
            grid-area: box1;
        }
        .box2{
            background-color: antiquewhite;
            grid-area: box2;
        }
        .box3{
            background-color: aqua;
            grid-area: box3;
        }
        .box4{
            background-color: azure;
            grid-area: box4;
        }
        .box5{
            background-color: blue;
            grid-area: box5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1" box>박스1</div>
        <div class="box2" box>박스2</div>
        <div class="box3" box>박스3</div>
        <div class="box4" box>박스4</div>
        <div class="box5" box>박스5</div>
    </div>
</body>
</html>
